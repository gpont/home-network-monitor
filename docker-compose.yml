services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home-network-monitor
    ports:
      - "3201:3201"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3201
      - DB_PATH=/app/data/monitor.db
      # Optional: comma-separated list of hosts to check SSL certs for
      # - SSL_HOSTS=google.com,cloudflare.com,github.com
      # Optional: iperf3 server address
      # - IPERF3_SERVER=your-server-ip
    # Create a .env file next to docker-compose.yml to customize settings (see .env.example)
    env_file:
      - path: .env
        required: false
    cap_add:
      - NET_RAW       # Required for ICMP ping
      - NET_ADMIN     # Required for some network operations
    # network_mode: host  # Linux only: better for gateway/traceroute detection.
    # On macOS Docker Desktop use bridge (default) with port mapping above.
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
